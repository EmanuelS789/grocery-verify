<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Verified — GroceryScouter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    .check {
      font-size: 72px;
      color: #4CAF50;
      margin-bottom: 24px;
      line-height: 1;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 16px;
    }
    p {
      font-size: 16px;
      color: #555;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .footer {
      font-size: 13px;
      color: #aaa;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">&#x2713;</div>
    <h1>Email Verified!</h1>
    <p>Your account has been confirmed. You can close this page and return to the GroceryScouter app to sign in.</p>
    <div class="footer">GroceryScouter</div>
  </div>
</body>
</html>
